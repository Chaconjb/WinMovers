<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orden de Trabajo - WinMovers</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand">
                <i class="fas fa-truck-moving sidebar-logo-icon"></i>
                <h2>WinMovers</h2>
            </div>
            <span class="sidebar-subtitle">Local and International Relocations</span>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="../index.html" class="sidebar-link"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a></li>
                <li><a href="orden-trabajo.html" class="sidebar-link active"><i class="fas fa-clipboard-list"></i><span>Orden de Trabajo</span></a></li>
                <li><a href="control-visitas.html" class="sidebar-link"><i class="fas fa-calendar-check"></i><span>Control de Visitas</span></a></li>
                <li><a href="exportacion.html" class="sidebar-link"><i class="fas fa-file-export"></i><span>Exportación</span></a></li>
                <li><a href="importacion.html" class="sidebar-link"><i class="fas fa-file-import"></i><span>Importación</span></a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <p><i class="fas fa-phone"></i> (506) 2215-3536</p>
            <p><i class="fas fa-envelope"></i> sales@winmovers.com</p>
        </div>
    </aside>

    <!-- MAIN -->
    <div class="main-wrapper">
        <header class="topbar">
            <button class="sidebar-toggle" id="sidebarToggle"><i class="fas fa-bars"></i></button>
            <h1 class="page-title"><i class="fas fa-clipboard-list"></i> Orden de Trabajo</h1>
            <div class="topbar-right">
                <span class="topbar-date" id="currentDate"></span>
            </div>
        </header>

        <main class="main-content">
            <!-- Formulario -->
            <section class="form-section">
                <div class="form-header">
                    <h2 class="content-title">Nueva Orden de Trabajo</h2>
                    <button class="btn btn-outline" id="btnVerListado"><i class="fas fa-list"></i> Ver Listado</button>
                </div>

                <form id="formOrdenTrabajo" class="form-card">
                    <input type="hidden" id="editId" value="">

                    <!-- Fila 1: Datos generales -->
                    <div class="form-row three-cols">
                        <div class="form-group">
                            <label for="numeroOT">O.T. #</label>
                            <input type="text" id="numeroOT" placeholder="Ej: 037M-2026">
                        </div>
                        <div class="form-group">
                            <label for="fechaServicio">Fecha de Servicio</label>
                            <input type="date" id="fechaServicio" required>
                        </div>
                        <div class="form-group">
                            <label for="fecha">Fecha</label>
                            <input type="date" id="fecha">
                        </div>
                    </div>

                    <!-- Fila 2: Hora -->
                    <div class="form-row">
                        <div class="form-group">
                            <label for="hora">Hora</label>
                            <input type="time" id="hora">
                        </div>
                    </div>

                    <!-- Fila 3: Cliente -->
                    <div class="form-row two-cols">
                        <div class="form-group">
                            <label for="nombreCliente">Nombre del Cliente</label>
                            <input type="text" id="nombreCliente" required placeholder="Nombre completo">
                        </div>
                        <div class="form-group">
                            <label for="telCelular">Tel. Celular</label>
                            <input type="tel" id="telCelular" placeholder="Ej: 8842-5454">
                        </div>
                    </div>

                    <div class="form-row two-cols">
                        <div class="form-group">
                            <label for="telResidencia">Tel. Residencia</label>
                            <input type="tel" id="telResidencia" placeholder="Teléfono de residencia">
                        </div>
                        <div class="form-group">
                            <label for="compania">Compañía</label>
                            <input type="text" id="compania" placeholder="Nombre de la compañía">
                        </div>
                    </div>

                    <div class="form-row two-cols">
                        <div class="form-group">
                            <label for="telEmpresa">Tel. Empresa</label>
                            <input type="tel" id="telEmpresa" placeholder="Teléfono empresa">
                        </div>
                        <div class="form-group">
                            <label for="contacto">Contacto</label>
                            <input type="text" id="contacto" placeholder="Persona de contacto">
                        </div>
                    </div>

                    <!-- Dirección -->
                    <div class="form-group">
                        <label for="direccion">Dirección (Origen)</label>
                        <textarea id="direccion" rows="2" placeholder="Dirección completa de origen"></textarea>
                    </div>

                    <div class="form-group">
                        <label for="direccionDestino">Dirección de Destino</label>
                        <textarea id="direccionDestino" rows="2" placeholder="Dirección de destino"></textarea>
                    </div>

                    <!-- Detalle del servicio -->
                    <div class="form-group">
                        <label for="detalleServicio">Detalle del Servicio</label>
                        <textarea id="detalleServicio" rows="3" placeholder="Descripción detallada del servicio a realizar"></textarea>
                    </div>

                    <!-- Materiales -->
                    <div class="form-group">
                        <label for="materiales">Materiales</label>
                        <textarea id="materiales" rows="2" placeholder="Materiales necesarios, personal, etc."></textarea>
                    </div>

                    <!-- Facturación -->
                    <div class="form-row two-cols">
                        <div class="form-group">
                            <label for="facturarA">Facturar a Nombre de</label>
                            <input type="text" id="facturarA" placeholder="Nombre para facturación">
                        </div>
                        <div class="form-group">
                            <label for="direccionCobro">Dirección de Cobro</label>
                            <input type="text" id="direccionCobro" placeholder="Dirección de cobro">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="hechoPor">Hecho Por</label>
                        <input type="text" id="hechoPor" placeholder="Nombre de quien elabora">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Orden</button>
                        <button type="button" class="btn btn-secondary" id="btnLimpiar"><i class="fas fa-eraser"></i> Limpiar</button>
                    </div>
                </form>
            </section>

            <!-- Listado de órdenes guardadas -->
            <section class="list-section" id="listadoSection" style="display:none;">
                <div class="form-header">
                    <h2 class="content-title">Órdenes Guardadas</h2>
                    <button class="btn btn-outline" id="btnNuevaOrden"><i class="fas fa-plus"></i> Nueva Orden</button>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>O.T. #</th>
                                <th>Cliente</th>
                                <th>Fecha Servicio</th>
                                <th>Compañía</th>
                                <th>Hecho por</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="ordenesBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../config/app.config.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../utils/storage.js"></script>
    <script src="../models/OrdenTrabajo.model.js"></script>
    <script src="../controllers/OrdenTrabajo.controller.js"></script>
</body>
</html>
